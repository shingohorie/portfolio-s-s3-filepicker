version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf .next
        - npm ci --cache .npm --prefer-offline
        - echo "NEXT_PUBLIC_AWS_REGION=$NEXT_PUBLIC_AWS_REGION" >> .env
        - echo "NEXT_PUBLIC_S3_BUCKET_NAME=$NEXT_PUBLIC_S3_BUCKET_NAME" >> .env
        - echo "NEXT_PUBLIC_MICROCMS_SERVICE_ID=$NEXT_PUBLIC_MICROCMS_SERVICE_ID" >> .env
        - echo "PRIVATE_S3_ACCESS_KEY_ID=$PRIVATE_S3_ACCESS_KEY_ID" >> .env
        - echo "PRIVATE_S3_SECRET_KEY=$PRIVATE_S3_SECRET_KEY" >> .env
        - echo "PRIVATE_AUTH_TOKEN=$PRIVATE_AUTH_TOKEN" >> .env
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
